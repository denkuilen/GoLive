<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welkom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f0e8;
      font-family: 'DM Sans', sans-serif;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 4rem 3.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
    }

    .dot {
      width: 52px;
      height: 52px;
      background: #1a1a2e;
      border-radius: 50%;
      margin: 0 auto 2rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      color: #1a1a2e;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    p {
      color: #666;
      font-size: 1rem;
      line-height: 1.7;
      font-weight: 300;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #e8c97a;
      margin: 2rem auto;
      border-radius: 2px;
    }

    .tag {
      display: inline-block;
      background: #f5f0e8;
      color: #888;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot"></div>
    <h1>Welkom</h1>
    <div class="divider"></div>
    <p>Fijn dat je er bent. Deze pagina is aangemaakt als startpunt en staat klaar om verder uitgebouwd te worden.</p>
    <div class="tag">GitHub Pages</div>
  </div>
</body>
</html>
